name: "Update nix flake inputs"

on:
  workflow_dispatch:
  schedule:
    - cron: 0 18 * * * # everyday 03:00 JST
defaults:
  run:
    shell: bash

jobs:
  update-nix:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      GIT_AUTHOR_NAME: peacock0803sz
      GIT_AUTHOR_EMAIL: 33555487+peacock0803sz@users.noreply.github.com
      GIT_COMMITTER_NAME: github-actions[bot]
      GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Update flake inputs
        run: |
          nix flake update && nix build .#default

          if [[ $(git status --untracked-files --short) ]]; then
            git add flake.lock
            git commit -m ":snowflake: Update flake.lock"
            git push origin HEAD
          else
            echo "Nothing to commit"
          fi
