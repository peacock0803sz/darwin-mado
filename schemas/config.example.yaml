# yaml-language-server: $schema=./config.v1.schema.json
# mado configuration file
# Path: ~/.config/mado/config.yaml
# Override the path with the MADO_CONFIG environment variable

# AX operation timeout (default: 5s)
timeout: 5s

# Default output format: text | json (default: text)
format: text

# Window layout presets
presets:
  - name: coding
    description: "Editor left, terminal right"
    rules:
      - app: Code
        position: [0, 0]
        size: [960, 1080]
      - app: Terminal
        position: [960, 0]
        size: [960, 1080]

  - name: meeting
    description: "Browser center, notes right"
    rules:
      - app: Safari
        title: Zoom
        position: [0, 0]
        size: [1280, 1080]
      - app: Notes
        position: [1280, 0]
        size: [640, 1080]

  # Use app_id (bundle identifier) instead of app (display name) for stable rules
  # that survive app renames or localization changes.
  - name: browse
    description: "Safari full-screen left monitor"
    rules:
      - app_id: com.apple.Safari
        position: [0, 0]
        size: [1920, 1080]

# Applications to exclude from list output and preset matching.
# Entries containing a dot (.) are matched against bundle identifiers;
# entries without a dot are matched against display names.
ignore_apps:
  - Dock
  - com.apple.controlcenter
